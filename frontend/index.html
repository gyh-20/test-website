<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Registration App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm" class="form-container">
            <h1>Welcome</h1>
            <p class="subtitle">Please sign in to continue</p>

            <form id="loginFormElement">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input
                        type="text"
                        id="loginUsername"
                        name="username"
                        placeholder="Enter your username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input
                        type="password"
                        id="loginPassword"
                        name="password"
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <p class="switch-form">
                Don't have an account?
                <button id="showRegister" class="btn-link">Register</button>
            </p>

            <div id="loginError" class="error-message"></div>
        </div>

        <!-- Registration Form -->
        <div id="registerForm" class="form-container hidden">
            <h1>Create Account</h1>
            <p class="subtitle">Fill in the details to register</p>

            <form id="registerFormElement">
                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input
                        type="text"
                        id="registerUsername"
                        name="username"
                        placeholder="Choose a username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input
                        type="password"
                        id="registerPassword"
                        name="password"
                        placeholder="Choose a password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary">Register</button>
            </form>

            <p class="switch-form">
                Already have an account?
                <button id="showLogin" class="btn-link">Login</button>
            </p>

            <div id="registerError" class="error-message"></div>
        </div>

        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="form-container hidden">
            <h1>Welcome!</h1>
            <p id="welcomeMessage" class="welcome-text"></p>
            <button id="logout" class="btn btn-primary">Logout</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
